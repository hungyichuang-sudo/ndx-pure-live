const troughs=['2025-04-04','2020-03-18']; if(st.mdd2_span.startsWith('live')) troughs.push(st.mdd2_span.split('→')[1]);
// ---- 月度 bar / 交易表 ----

const bar1=allM.map(m=>m.net1*100), bar2=allM.map(m=>m.net2*100), mlab=allM.map(m=>m.month);
const trows=allM.map(m=>{const ext=!S.trades.includes(m);
 const h=m.holdings.map((t,i)=>(m.cluster[i]?'▲':'')+t).join(' ');
 return `<tr${ext?' class="extrow"':''}><td>${m.month}${m.naked?'⚠':''}${ext?' ⟲':''}</td><td>${h}</td><td>${F(m.net1)}</td><td>${F(m.net2)}</td></tr>`}).join('');

const rel=fr.h<1?'不到 1 小時前':(fr.h<48?Math.round(fr.h)+' 小時前':(fr.h/24).toFixed(1)+' 天前');
const DOT={g:'var(--grn)',a:'var(--amb)',r:'var(--red)'};

const logTxt=logN?`最近 ${lastLog.date}: ${(lastLog.added||[]).map(x=>'+'+x).concat((lastLog.removed||[]).map(x=>'\u2212'+x)).join(' ')}`:`自 ${u.baseline||u.checked||'部署'} 以來無變動`;

const ghLink=(()=>{try{const o=location.hostname.split('.')[0],r=location.pathname.split('/').filter(Boolean)[0];return(o&&r)?`https://github.com/${o}/${r}/actions`:null}catch(e){return null}})();
const statusHtml=`<div class="pan"><h3>系統狀態(真實更新狀態 —— 後端掛了這裡自己變紅,不會裝沒事)</h3>
<div class="grid g4">
<div class="c"><div class="k">資料更新 ${dot(fr.lv)}</div><div class="v" style="font-size:15px">${rel}</div><div class="n">上次成功: ${L.as_of}<br>價格至 ${C.price_date} · 排程:每交易日 22:20 UTC(台北 06:20)<br>規則:>32h 轉黃(跨週末每日+24h 寬限),再 +24h 轉紅 —— 由你的瀏覽器當場計算</div></div>
<div class="c"><div class="k">NDX-100 成分來源 ${dot(uLv)}</div><div class="v" style="font-size:15px">${u.count||'?'} 檔</div><div class="n">${uTxt}<br>本次核對: ${u.checked||'?'} · 護欄:95~110 檔才接受</div></div>
<div class="c"><div class="k">成分變動記錄(PIT) ${dot('g')}</div><div class="v" style="font-size:15px">${logN?logN+' 次':'無變動'}</div><div class="n">${logTxt}<br>變動自動記日期入檔,舊決策永不重算</div></div>
<div class="c"><div class="k">資料完整性 ${dot(exN?'a':'g')}</div><div class="v" style="font-size:15px">${exN?exN+' 檔缺價':'全數有價格'}</div><div class="n">${exN?('缺: '+L.excluded_tickers.join(' ')):'成分股日線資料齊全(≥151 根)'}<br>接縫: 2026-06 前=Sharadar / 之後=yfinance</div></div>
</div>${ghLink?`<div class="sub" style="margin-top:8px">▸ <a href="${ghLink}" style="color:var(--blu)">查看每日自動執行記錄(GitHub Actions)↗</a></div>`:''}</div>`;
document.getElementById('app').innerHTML=`
${curAlert}
${statusHtml}
<div class="pan"><h3>當前狀態(每交易日自動更新)</h3>
<div class="grid g4">
<div class="c"><div class="k">本月實際持倉(${C.holdings_formation||'—'} 形成)</div><div class="v" style="font-size:15px">${C.holdings?C.holdings.join(' / '):'—'}</div><div class="n">各 1/3 · 下次換倉=本月最後交易日收盤</div></div>
<div class="c"><div class="k">本月至今 1× / 2×</div><div class="v ${C.mtd2>=0?'g':'r'}" style="font-size:16px">${F(C.mtd1)} / ${F(C.mtd2)}</div><div class="n">進行中,未扣本月換倉成本</div></div>
<div class="c"><div class="k">今日排名 Top-3(若今天是月底就買這三檔)</div><div class="v" style="font-size:15px">${C.top3_now.join(' / ')}</div><div class="n">叢集 ${C.top3_cluster}/3</div></div>
<div class="c"><div class="k">裸賭注月數(歷史累計)</div><div class="v ${st.naked_months>5?'r':'a'}">${st.naked_months}</div><div class="n">3 檔全為半導體/記憶體的月份</div></div></div>
<h3>今日 radj-150 排名前 20</h3><div class="scroll"><table><thead><tr><th>#</th><th>Ticker</th><th>radj</th><th>150d 報酬</th></tr></thead><tbody>${rank}</tbody></table></div></div>

<div id="tvbox" style="height:430px;border:1px solid var(--bd);border-radius:8px;overflow:hidden"></div>
<div class="sub">TradingView 免費源:盤中即時或最多延遲 ~15 分鐘(依其供應)。日 K 預設,圖內可自行切分時/週線。持倉換月後重新整理本頁,按鈕自動換成新持倉。</div></div>

<h2>八項總結區塊</h2>

<button class="btn on" id="b10">近10年</button><button class="btn" id="ball">全期(2013→)</button>

<div class="pan"><h3>② 回測方式 / ③ 實盤操作</h3>
<div style="font-size:12.5px">
<b>回測:</b>point-in-time NDX-100(依時序滾動,含下市股,無存活偏誤)→ 每檔 radj-150 =(150 交易日報酬 ÷ 同期年化波動)→ 由高到低 → <b>不套任何叢集限制</b> → Top-3 等權 → 月底收盤換 diff → 20bps 往返成本×換手率。2× = 月底重設兩倍、IBKR 融資 6.5%/yr 假設(僅借款計息)。<br>
<b>實盤 SOP:</b>每月最後交易日收盤前:看本頁「今日排名 Top-3」→ 與現持倉比對 → 只換差異部位 → 各 1/3(2× 則各 2/3 本金,月底調回 2.0×)。<b>融資只用 IBKR 保證金,勿用幣安永續</b>(funding 對全倉收,2× ≈ −26pp/年名目)。</div></div>

<div class="pan"><h3>radj-150 訊號:具體公式與白話拆解</h3>
<div style="font-size:12.5px;line-height:1.95">
<b>一句話:</b>「過去 150 個交易日漲了多少」除以「這段期間抖得多兇」— 同樣漲 50%,穩穩爬上去的分數高,暴漲暴跌爬上去的分數低。<br><br>
<b>公式:</b><span style="font-family:'IBM Plex Mono';color:var(--grn);font-size:14px"> radj-150 = R₁₅₀ ÷ σ_ann </span><br>
<b>分子 R₁₅₀(漲多少):</b><span style="font-family:'IBM Plex Mono'">R₁₅₀ = P<sub>今日收盤</sub> ÷ P<sub>150個交易日前收盤</sub> − 1</span><br>
用<b>還原收盤價</b>(除息/分割已調整);150 個「交易日」≈ 7 個月;skip=0(算到最近一根收盤,不跳過近月)。<br>
<b>分母 σ_ann(抖多兇),三步:</b>① 取這 150 天每天的日報酬 r<sub>t</sub>=P<sub>t</sub>/P<sub>t−1</sub>−1 → ② 算標準差 σ<sub>daily</sub>(衡量數字散得多開:天天±0.5% 的小、一天+8%一天−6% 的大)→ ③ 年化 σ_ann = σ<sub>daily</sub>×√252(一年約 252 個交易日;乘√而非直接乘,因為每天的震盪會部分互相抵消)。<br><br>
<b>為什麼要除這一下(訊號的靈魂):</b>
<table style="max-width:520px"><thead><tr><th></th><th>A 股</th><th>B 股</th></tr></thead><tbody>
<tr><td>150 日報酬</td><td>+48%</td><td>+60%</td></tr>
<tr><td>年化波動</td><td>30%</td><td>75%</td></tr>
<tr><td><b>radj</b></td><td class="g" style="color:var(--grn)"><b>1.60 ← 第1名</b></td><td>0.80 → 第2名</td></tr></tbody></table>
B 漲更多,但那 60% 是坐雲霄飛車換來的 — 波動大的股票,過去的暴漲更可能是雜訊/泡沫,回吐也兇。除以波動後「穩穩的強」排到前面。<b>分母就是內建風控,在選股那一刻生效,不是事後補的。</b><br><br>
<b>從公式到下單:</b>每月最後交易日收盤 → 當時 point-in-time 成分股各算一個 radj-150(不足 151 根日線者跳過)→ 由高到低排 → 取前 3(本頁為無 cap 純訊號版;GOOGL/GOOG 同發行人去重)→ 各 1/3 資金 → 只交易與上月的差異部位。<br>
<b>三個實作坑:</b>① 價格沒還原 → 配息股被系統性低估(本頁用 yfinance auto_adjust);② 150「日曆天」≠150「交易日」(前者只有約 103 根,算出來是另一個訊號);③ σ=0 或資料不足 → 該股跳過,避免除以零。<br>
<b>誠實註記:</b>分子分母同用 150 天窗是<b>設計上的簡潔選擇</b>(一個參數少一個可過擬合的旋鈕),不是數學上證明最優;150 這個數字由網格掃出,但經 13/14 年自適應回測驗證各年都選回它附近,非幸運數字。
</div></div>

<div class="redline">▸ <b>6.5%/yr 為 IBKR 假設值</b>,實際利率依帳戶浮動,開倉前自查;裸賭注月(現 ${st.naked_months} 個)的隔夜跳空尾巴,MC 與日頻歷史都量不到。</div></div>
<div class="foot">凍結歷史來源:Sharadar PIT 回測(pure2x 戰役,VPS 三重驗證,2026-07-03)。即時延伸:yfinance,決策即時記錄(不可能偷看未來=PIT)。成分清單每交易日自動核對(Wikipedia 主源/FMP 備援/失敗沿用快取), 變動記日期入檔;半導體叢集自動判定+記憶體/儲存手動名單。本頁為研究監控工具,非投資建議。</div>`;

const IX={mode:'index',intersect:false};
const TT=fmt=>({backgroundColor:'#11161f',borderColor:'#2a3546',borderWidth:1,titleColor:'#4aa8f5',bodyColor:'#e6edf6',padding:10,callbacks:{label:c=>' '+(c.dataset.label||'')+': '+fmt(c.parsed.y)}});
const XH={id:'xh',afterDatasetsDraw(c){const t=c.tooltip;if(!t||!t.getActiveElements||!t.getActiveElements().length)return;const x=t.getActiveElements()[0].element.x;const ctx=c.ctx;ctx.save();ctx.strokeStyle='rgba(126,138,154,.45)';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x,c.chartArea.top);ctx.lineTo(x,c.chartArea.bottom);ctx.stroke();ctx.restore();}};
let eqChart, from10=true;
function drawEq(){
  const cutIdx = labels.findIndex(d=>d>= new Date(Date.now()-3652.5*864e5).toISOString().slice(0,10));
  const cut = from10? Math.max(cutIdx,0) : 0;
  const lb=labels.slice(cut);
  const b1=from10&&d1[cut]?d1[cut]:1, b2=from10&&d2[cut]?d2[cut]:1;
  const a1=d1.slice(cut).map(v=>v/b1), a2=d2.slice(cut).map(v=>v/b2);
  const sub=document.getElementById('eqsub');
  if(sub) sub.innerHTML = from10
   ? `近10年視窗(每日自動前滾)·起點 ${lb[0]} 資金重設為 1:至今 1× <b>${a1[a1.length-1].toFixed(1)}×</b> / 2× <b>${a2[a2.length-1].toFixed(1)}×</b> · 2026-06 前=凍結週取樣,之後=即時日頻;紅點=歷史谷底`
   : `全期(2013→,起點=1):終值 1× <b>${a1[a1.length-1].toFixed(0)}×</b> / 2× <b>${a2[a2.length-1].toFixed(0)}×</b> · 凍結週取樣+即時日頻;紅點=歷史谷底`;
  if(eqChart) eqChart.destroy();
  eqChart=new Chart(document.getElementById('eq'),{type:'line',data:{labels:lb,datasets:[
   {label:'1×',data:a1,borderColor:'#22d3a8',borderWidth:1.8,pointRadius:0,tension:.1},
   {label:'2×(@6.5%)',data:a2,borderColor:'#f5b94a',borderWidth:1.8,pointRadius:0,tension:.1}]},
   options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:IX,
    plugins:{legend:{labels:{color:'#d7dee8',font:{size:11}}},
     tooltip:TT(v=>v>=100?v.toFixed(0)+'×':v.toFixed(2)+'×')},
    scales:{y:{type:'logarithmic',grid:{color:GRID},ticks:{color:DIM}},x:{grid:{display:false},ticks:{color:DIM,maxTicksLimit:10}}}},
   plugins:[XH,{id:'tr',afterDatasetsDraw(c){const ctx=c.ctx;troughs.forEach(td=>{const i=lb.indexOf(td);if(i<0)return;
     const m=c.getDatasetMeta(1).data[i];if(!m)return;ctx.beginPath();ctx.arc(m.x,m.y,4,0,7);ctx.fillStyle='#ef4455';ctx.fill();});}}]});
}
drawEq();
document.getElementById('b10').onclick=()=>{from10=true;tog('b10','ball');drawEq()};
document.getElementById('ball').onclick=()=>{from10=false;tog('ball','b10');drawEq()};
function tog(a,b){document.getElementById(a).classList.add('on');document.getElementById(b).classList.remove('on')}
let barChart,mode2=true;
function drawBar(){const d=mode2?bar2:bar1;if(barChart)barChart.destroy();
 barChart=new Chart(document.getElementById('bar'),{type:'bar',data:{labels:mlab,datasets:[{data:d,
  backgroundColor:d.map(v=>v<0?'#ef4455':'rgba(34,211,168,.75)')}]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:IX,plugins:{legend:{display:false},tooltip:TT(v=>(v>=0?'+':'')+v.toFixed(2)+'%')},
  scales:{y:{grid:{color:GRID},ticks:{color:DIM,callback:v=>v+'%'},title:{display:true,text:'%(已×100)',color:DIM}},
   x:{grid:{display:false},ticks:{color:DIM,maxTicksLimit:14}}}},plugins:[XH]});}
drawBar();
document.getElementById('m2').onclick=()=>{mode2=true;tog('m2','m1');drawBar()};
document.getElementById('m1').onclick=()=>{mode2=false;tog('m1','m2');drawBar()};
new Chart(document.getElementById('fan'),{type:'line',data:{labels:[...Array(37).keys()],datasets:
 [['p95','#4aa8f5'],['p75','#22d3a8'],['p50','#ffffff'],['p25','#f5b94a'],['p5','#ef4455']].map(([p,col])=>({label:p,data:MC.fan[p.slice(1)],borderColor:col,borderWidth:p==='p50'?2.2:1.3,pointRadius:0}))},
 options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:IX,plugins:{legend:{labels:{color:'#d7dee8',font:{size:10.5}}},tooltip:Object.assign(TT(v=>v.toFixed(2)+'×'),{callbacks:{title:it=>'第 '+it[0].label+' 個月',label:c=>' '+c.dataset.label+': '+c.parsed.y.toFixed(2)+'×'}})},
 scales:{y:{type:'logarithmic',grid:{color:GRID},ticks:{color:DIM,callback:v=>v+'×'}},x:{grid:{display:false},ticks:{color:DIM},title:{display:true,text:'月',color:DIM}}}},plugins:[XH]});
// ---- TradingView 即時K線(符號=本月持倉) ----
const tvSyms=(C.holdings&&C.holdings.length?C.holdings:C.top3_now)||[];
function tvLoad(sym){
  const box=document.getElementById('tvbox'); box.innerHTML='';
  document.querySelectorAll('#tvbtns .btn').forEach(b=>b.classList.toggle('on',b.dataset.s===sym));
  if(typeof TradingView==='undefined'){
    box.innerHTML='<div style="padding:24px;color:var(--dim)">TradingView 元件載入失敗(可能被網路環境擋)。直接開圖: '+
      tvSyms.map(t=>`<a style="color:var(--blu)" target="_blank" href="https://www.tradingview.com/chart/?symbol=NASDAQ:${t}">${t}</a>`).join(' · ')+'</div>';
    return;}
  new TradingView.widget({container_id:'tvbox',symbol:'NASDAQ:'+sym,interval:'D',theme:'dark',style:'1',
    locale:'zh_TW',timezone:'Asia/Taipei',autosize:true,hide_side_toolbar:true,allow_symbol_change:false,withdateranges:true});
}
if(tvSyms.length){
  document.getElementById('tvbtns').innerHTML=tvSyms.map((t,i)=>`<button class="btn${i===0?' on':''}" data-s="${t}">${t}</button>`).join('');
  document.querySelectorAll('#tvbtns .btn').forEach(b=>b.onclick=()=>tvLoad(b.dataset.s));
  const sc=document.createElement('script'); sc.src='https://s3.tradingview.com/tv.js';
  sc.onload=()=>tvLoad(tvSyms[0]); sc.onerror=()=>tvLoad(tvSyms[0]);
  document.head.appendChild(sc);
}
}).catch(e=>{document.getElementById('sub').textContent='資料載入失敗:'+e;});
</script></body></html>
